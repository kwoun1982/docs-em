<!-- @dsCard group="Components" viewport="700x280" name="Feedback & signals" subtitle="StatusPill · Connection · Gate · Progress" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-base); }
  .grid { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-subtle); width: 88px; flex-shrink: 0; }
  #root { opacity: 0; transition: opacity .2s; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { StatusPill, ProgressBar, Tooltip, ConnectionBadge, ExternalCallsCounter, GateChip } = window.DocsEmDesignSystem_afe3d1;
    function Row({ label, children }) {
      return <div className="row"><span className="lbl">{label}</span>{children}</div>;
    }
    function Demo() {
      return (
        <div className="grid">
          <Row label="Status">
            <StatusPill tone="ok">색인됨</StatusPill>
            <StatusPill tone="online">연결됨</StatusPill>
            <StatusPill tone="running">embedding…</StatusPill>
            <StatusPill tone="warn">RETRY</StatusPill>
            <StatusPill tone="error" indicator="icon">FAIL</StatusPill>
          </Row>
          <Row label="Connection">
            <ConnectionBadge status="ok" />
            <ExternalCallsCounter count={0} />
          </Row>
          <Row label="Gate">
            <GateChip state="pass">G1 PASS</GateChip>
            <GateChip state="fail">L1 G1 미달</GateChip>
            <GateChip state="fallback" size="sm">content empty → reasoning_content</GateChip>
          </Row>
          <Row label="Progress">
            <div style={{ width: 160 }}><ProgressBar value={64} showLabel /></div>
            <div style={{ width: 130 }}><ProgressBar indeterminate showLabel /></div>
          </Row>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
    document.getElementById("root").style.opacity = 1;
  </script>
</body>
</html>
