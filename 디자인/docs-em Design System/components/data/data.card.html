<!-- @dsCard group="Components" viewport="700x320" name="Data display" subtitle="Metric · ScoreChip · ScoreBar · DataTable · Tag" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-base); }
  .grid { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .metrics { display: flex; gap: 40px; }
  .lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-subtle); width: 64px; flex-shrink: 0; }
  #root { opacity: 0; transition: opacity .2s; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Metric, ScoreBar, ScoreChip, DataTable, Tag, Kbd, StatusPill } = window.DocsEmDesignSystem_afe3d1;
    function Demo() {
      const rows = [
        { id: 1, doc: "휴가규정.pdf", recall: 0.94, status: "ok" },
        { id: 2, doc: "출장경비.docx", recall: 0.71, status: "warn" },
        { id: 3, doc: "온보딩.md", recall: 0.92, status: "ok" },
      ];
      return (
        <div className="grid">
          <div className="metrics">
            <Metric label="Recall@5" value="0.912" delta={0.015} />
            <Metric label="p50 지연" value="1,284" unit="ms" delta={-112} deltaUnit="ms" invertDelta />
            <Metric label="색인 문서" value="3,418" hint="42 코퍼스" />
          </div>
          <div className="row"><span className="lbl">Score</span>
            <ScoreChip kind="sim" value={0.695} />
            <ScoreChip kind="sim" value={0.695} gap={-0.018} />
            <ScoreChip kind="bm25" value={12.4} decimals={1} />
            <div style={{ width: 150 }}><ScoreBar value={0.912} /></div>
          </div>
          <div className="row"><span className="lbl">Tags</span>
            <Tag icon="cpu">gemma-4-e4b</Tag>
            <Tag tone="blue" icon="folder">휴가규정</Tag>
            <Tag tone="teal">top_k=5</Tag>
            <span style={{ display:"inline-flex", gap:4, alignItems:"center" }}><Kbd>⌘</Kbd><Kbd>K</Kbd></span>
          </div>
          <DataTable
            dense
            columns={[
              { key: "doc", label: "문서", mono: true },
              { key: "recall", label: "Recall@5", align: "right", width: 150, render: (v) => <ScoreBar value={v} width={120} /> },
              { key: "status", label: "판정", render: (v) => <StatusPill tone={v} size="sm">{v === "ok" ? "pass" : "review"}</StatusPill> },
            ]}
            rows={rows}
          />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
    document.getElementById("root").style.opacity = 1;
  </script>
</body>
</html>
