<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Small corners — console, not consumer" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-base); display: flex; gap: 18px; align-items: center; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 60px; height: 60px; background: var(--bg-raised); border: 1px solid var(--border-strong); }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
  .v b { color: var(--fg-muted); font-weight: 500; }
</style>
</head>
<body>
  <div class="u"><div class="box" style="border-radius:2px"></div><div class="v"><b>xs</b> 2</div></div>
  <div class="u"><div class="box" style="border-radius:4px"></div><div class="v"><b>sm</b> 4</div></div>
  <div class="u"><div class="box" style="border-radius:6px"></div><div class="v"><b>md</b> 6</div></div>
  <div class="u"><div class="box" style="border-radius:8px"></div><div class="v"><b>lg</b> 8</div></div>
  <div class="u"><div class="box" style="border-radius:12px"></div><div class="v"><b>xl</b> 12</div></div>
  <div class="u"><div class="box" style="border-radius:9999px"></div><div class="v"><b>full</b> ∞</div></div>
</body>
</html>
