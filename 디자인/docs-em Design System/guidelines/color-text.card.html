<!-- @dsCard group="Colors" viewport="700x180" name="Text & borders" subtitle="Three foreground steps, three hairlines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: #0D1117; display: flex; gap: 28px; align-items: stretch; }
  .col { flex: 1; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-faint); margin-bottom: 12px; }
  .line { display: flex; align-items: baseline; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border-subtle); }
  .t { font-size: 15px; }
  .code { font-family: var(--font-mono); font-size: 11px; color: var(--fg-faint); }
  .brow { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
</style>
</head>
<body>
  <div class="col">
    <div class="lbl">Foreground</div>
    <div class="line"><span class="t" style="color:#E6EDF3">primary</span><span class="code">#E6EDF3</span></div>
    <div class="line"><span class="t" style="color:#9DA7B3">secondary</span><span class="code">#9DA7B3</span></div>
    <div class="line"><span class="t" style="color:#6E7681">faint</span><span class="code">#6E7681</span></div>
  </div>
  <div class="col">
    <div class="lbl">Borders</div>
    <div class="brow"><span class="code" style="width:64px">subtle</span><div style="flex:1;border-top:1px solid #21262D"></div></div>
    <div class="brow"><span class="code" style="width:64px">default</span><div style="flex:1;border-top:1px solid #30363D"></div></div>
    <div class="brow"><span class="code" style="width:64px">strong</span><div style="flex:1;border-top:1px solid #3D444D"></div></div>
  </div>
</body>
</html>
