<!-- @dsCard group="Colors" viewport="700x150" name="Dual-coded status" subtitle="Never color alone — color + shape + text label" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: #0D1117; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .pill { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 12.5px; font-weight: 600; padding: 5px 11px; border-radius: var(--radius-md); }
  .sym { font-family: var(--font-mono); font-size: 13px; }
</style>
</head>
<body>
  <span class="pill" style="background:rgba(63,185,80,0.10);color:#3FB950;border:1px solid rgba(63,185,80,0.40)"><span class="sym">✔</span>OK</span>
  <span class="pill" style="background:rgba(45,212,191,0.10);color:#2DD4BF;border:1px solid rgba(45,212,191,0.40)"><span class="sym">●</span>ONLINE</span>
  <span class="pill" style="background:rgba(210,153,34,0.10);color:#D29922;border:1px solid rgba(210,153,34,0.40)"><span class="sym">⟳</span>RETRY</span>
  <span class="pill" style="background:rgba(248,81,73,0.10);color:#F85149;border:1px solid rgba(248,81,73,0.40)"><span class="sym">✕</span>FAIL</span>
  <span style="font-size:12px;color:var(--fg-faint);max-width:150px;line-height:1.45">색맹 사용자도 구분하도록 점·아이콘·텍스트를 병기 (WCAG AA)</span>
</body>
</html>
