<!-- @dsCard group="Spacing" viewport="700x176" name="Spacing scale" subtitle="4px base unit, 1 → 64" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-base); display: flex; align-items: flex-end; gap: 16px; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--signal-bg-hi); border: 1px solid var(--signal-border); border-radius: var(--radius-xs); width: 18px; }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
</style>
</head>
<body>
  <div class="u"><div class="bar" style="height:4px"></div><div class="v">4</div></div>
  <div class="u"><div class="bar" style="height:8px"></div><div class="v">8</div></div>
  <div class="u"><div class="bar" style="height:12px"></div><div class="v">12</div></div>
  <div class="u"><div class="bar" style="height:16px"></div><div class="v">16</div></div>
  <div class="u"><div class="bar" style="height:20px"></div><div class="v">20</div></div>
  <div class="u"><div class="bar" style="height:24px"></div><div class="v">24</div></div>
  <div class="u"><div class="bar" style="height:32px"></div><div class="v">32</div></div>
  <div class="u"><div class="bar" style="height:40px"></div><div class="v">40</div></div>
  <div class="u"><div class="bar" style="height:48px"></div><div class="v">48</div></div>
  <div class="u"><div class="bar" style="height:64px"></div><div class="v">64</div></div>
</body>
</html>
