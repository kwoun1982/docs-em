<!-- @dsCard group="Type" viewport="700x190" name="Families" subtitle="Pretendard for UI · Geist Mono for data" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-base); display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-subtle); margin-bottom: 10px; }
  .fam { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-bottom: 14px; }
  .sans { font-family: var(--font-sans); }
  .mono { font-family: var(--font-mono); }
  .big { font-size: 28px; color: var(--fg-default); letter-spacing: -0.01em; line-height: 1.1; }
  .kr { font-size: 15px; color: var(--fg-muted); margin-top: 8px; }
  .data { font-size: 24px; color: var(--signal); letter-spacing: -0.01em; }
  .glyphs { font-size: 13px; color: var(--fg-subtle); margin-top: 8px; }
</style>
</head>
<body>
  <div>
    <div class="lbl">UI · Sans</div>
    <div class="fam">Pretendard</div>
    <div class="sans big">질의응답 인덱싱</div>
    <div class="sans kr">Aa Gg · 폐쇄망 로컬 추론 · 0 외부 호출</div>
  </div>
  <div>
    <div class="lbl">Data · Mono</div>
    <div class="fam">JetBrains Mono</div>
    <div class="mono data">0.912 · 1,284ms</div>
    <div class="mono glyphs">chunk_0427 · recall@5 · v3.2.1</div>
  </div>
</body>
</html>
