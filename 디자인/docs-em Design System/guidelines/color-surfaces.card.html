<!-- @dsCard group="Colors" viewport="700x176" name="Backgrounds & surfaces" subtitle="GitHub-dimmed dark ground, exact tokens" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: #0D1117; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 64px; }
  .meta { padding: 8px 9px; background: #161B22; border-top: 1px solid var(--border-subtle); }
  .name { font-size: 11px; color: var(--fg-muted); font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-faint); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0D1117"></div><div class="meta"><div class="name">canvas</div><div class="hex">#0D1117</div></div></div>
    <div class="sw"><div class="chip" style="background:#0A0C10"></div><div class="meta"><div class="name">sunken</div><div class="hex">#0A0C10</div></div></div>
    <div class="sw"><div class="chip" style="background:#161B22"></div><div class="meta"><div class="name">surface 1</div><div class="hex">#161B22</div></div></div>
    <div class="sw"><div class="chip" style="background:#1C2128"></div><div class="meta"><div class="name">surface 2</div><div class="hex">#1C2128</div></div></div>
    <div class="sw"><div class="chip" style="background:#30363D"></div><div class="meta"><div class="name">border</div><div class="hex">#30363D</div></div></div>
    <div class="sw"><div class="chip" style="background:#3D444D"></div><div class="meta"><div class="name">border hi</div><div class="hex">#3D444D</div></div></div>
  </div>
</body>
</html>
