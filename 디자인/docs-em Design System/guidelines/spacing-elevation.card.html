<!-- @dsCard group="Spacing" viewport="700x172" name="Elevation" subtitle="Restrained — hairline first, shadow second" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 22px; background: var(--bg-canvas); display: flex; gap: 22px; align-items: center; justify-content: space-between; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 12px; flex: 1; }
  .box { width: 100%; height: 56px; background: var(--bg-raised); border: 1px solid var(--border-default); border-radius: var(--radius-md); }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
</style>
</head>
<body>
  <div class="u"><div class="box" style="box-shadow:0 1px 2px rgba(0,0,0,0.35)"></div><div class="v">xs</div></div>
  <div class="u"><div class="box" style="box-shadow:0 2px 6px rgba(0,0,0,0.40)"></div><div class="v">sm</div></div>
  <div class="u"><div class="box" style="box-shadow:0 6px 20px rgba(0,0,0,0.45)"></div><div class="v">md</div></div>
  <div class="u"><div class="box" style="box-shadow:0 16px 48px rgba(0,0,0,0.55)"></div><div class="v">lg</div></div>
  <div class="u"><div class="box" style="box-shadow:0 24px 64px rgba(0,0,0,0.62)"></div><div class="v">overlay</div></div>
</body>
</html>
