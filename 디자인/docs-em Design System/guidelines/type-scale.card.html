<!-- @dsCard group="Type" viewport="700x300" name="Scale" subtitle="11 → 42px dense dev-tool rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg-base); font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: none; }
  .spec { color: var(--fg-default); letter-spacing: -0.01em; line-height: 1.15; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); width: 96px; text-align: right; }
</style>
</head>
<body>
  <div class="row"><div class="spec" style="font-size:42px;font-weight:600">0.912</div><div class="tag">5xl · 42</div></div>
  <div class="row"><div class="spec" style="font-size:32px;font-weight:600">평가 대시보드</div><div class="tag">4xl · 32</div></div>
  <div class="row"><div class="spec" style="font-size:26px;font-weight:600">검색 증강 생성</div><div class="tag">3xl · 26</div></div>
  <div class="row"><div class="spec" style="font-size:21px;font-weight:500">인덱싱 진행 상황</div><div class="tag">2xl · 21</div></div>
  <div class="row"><div class="spec" style="font-size:16px">문서를 임베딩하는 중입니다</div><div class="tag">lg · 16</div></div>
  <div class="row"><div class="spec" style="font-size:14px;color:var(--fg-muted)">본문 기본 — body copy default</div><div class="tag">base · 14</div></div>
  <div class="row"><div class="spec" style="font-size:13px;color:var(--fg-muted)">컨트롤 라벨 control text</div><div class="tag">sm · 13</div></div>
  <div class="row"><div class="spec" style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-subtle)">EYEBROW LABEL</div><div class="tag">2xs · 11</div></div>
</body>
</html>
