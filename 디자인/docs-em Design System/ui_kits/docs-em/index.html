<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>docs-em</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; margin: 0; }
  body { background: var(--surface-app); overflow: hidden; }
  #app { height: 100vh; }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="AppShell.jsx"></script>
  <script type="text/babel" src="QueryScreen.jsx"></script>
  <script type="text/babel" src="IndexScreen.jsx"></script>
  <script type="text/babel" src="EvalScreen.jsx"></script>
  <script type="text/babel">
    function App() {
      const [active, setActive] = React.useState("query");
      const Screen = active === "query" ? window.QueryScreen : active === "index" ? window.IndexScreen : window.EvalScreen;
      return (
        <window.AppShell active={active} onNavigate={setActive}>
          <Screen />
        </window.AppShell>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
